name: Keep Alive

on:
  schedule:
    # Runs every 15 hours
    - cron: '0 */15 * * *'
  workflow_dispatch: # Allows manual triggering

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Health Endpoint
        run: |
          # Replace with your actual production URL
          URL="https://nearh-beta.vercel.app/api/health"
          echo "Pinging $URL..."
          curl -f -s $URL || exit 1
          echo "Success!"
